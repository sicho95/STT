<!DOCTYPE html>
<html>
<head>
    <title>Générateur STT 100% Offline</title>
    <style>
        body { font-family: sans-serif; text-align: center; padding: 50px; background: #f4f4f9; }
        .box { max-width: 600px; margin: auto; background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        button { padding: 20px; background: #34c759; color: white; border: none; border-radius: 12px; cursor: pointer; font-weight: bold; width: 100%; font-size: 16px; }
        #log { margin-top: 20px; color: #666; font-size: 13px; }
    </style>
</head>
<body>
    <div class="box">
        <h2>Générateur STT Ultra-Safe</h2>
        <p>Ce bouton va créer un fichier HTML contenant <b>le moteur Transformers.js intégré</b>. Aucun appel externe ne sera fait par l'app finale.</p>
        <button id="go">GÉNÉRER L'APP 100% AUTONOME</button>
        <div id="log"></div>
    </div>

    <script>
        document.getElementById('go').onclick = async () => {
            const log = document.getElementById('log');
            log.innerText = "⏳ Récupération du moteur Transformers.js...";
            
            try {
                // On récupère la version bundle de transformers.js
                const response = await fetch('https://cdn.jsdelivr.net/npm/@xenova/transformers@2.17.2/dist/transformers.min.js');
                const transformersCode = await response.text();
                
                log.innerText = "⏳ Génération du fichier final...";

                const finalHtml = `<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
    <title>STT Offline Pro</title>
    <style>
        :root { --p: #007aff; --d: #ff3b30; --s: #34c759; }
        body { font-family: -apple-system, sans-serif; background: #f2f2f7; margin: 0; padding: 10px; display: flex; justify-content: center; }
        .card { background: white; border-radius: 20px; padding: 15px; width: 100%; max-width: 800px; box-shadow: 0 5px 20px rgba(0,0,0,0.05); }
        .badge { display: block; text-align: center; padding: 6px; border-radius: 10px; font-size: 11px; font-weight: bold; background: #e5e5ea; margin-bottom: 10px; color: #333; }
        button { width: 100%; border-radius: 12px; border: none; font-size: 15px; margin-top: 8px; padding: 12px; background: var(--p); color: white; font-weight: bold; cursor: pointer; }
        textarea { width: 100%; height: 45vh; border-radius: 12px; border: 1px solid #d1d1d6; padding: 12px; margin-top: 10px; font-size: 16px; box-sizing: border-box; resize: none; }
        #prog { display:none; margin-top:10px; height:20px; background:#eee; border-radius:10px; overflow:hidden; position:relative; }
        #prog-b { width:0%; height:100%; background:var(--s); transition: width 0.3s; }
        #prog-t { position:absolute; width:100%; text-align:center; line-height:20px; font-size:11px; font-weight:bold; }
        .recording { background: var(--d) !important; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 10px; }
    </style>
</head>
<body>
    <div class="card">
        <div id="stat" class="badge">PRÊT (OFFLINE)</div>
        <div id="setup">
            <select id="model-select" style="width:100%; padding:12px; margin-bottom:10px; border-radius:8px;">
                <option value="Xenova/whisper-tiny">Whisper Tiny (Léger)</option>
                <option value="Xenova/whisper-base">Whisper Base (Moyen)</option>
            </select>
            <button id="btn-init">DÉMARRER L'IA</button>
        </div>
        
        <div id="app" style="display:none">
            <button id="btn-rec">🎤 MICRO (DICTÉE)</button>
            <div id="prog"><div id="prog-t">0%</div><div id="prog-b"></div></div>
            <textarea id="out" placeholder="Le texte apparaîtra ici..."></textarea>
            <div class="grid">
                <button id="btn-file" style="background:#5856d6">📁 FICHIER (M4A/MP3)</button>
                <button id="btn-copy" style="background:#8e8e93">📋 COPIER</button>
            </div>
            <input type="file" id="f-in" accept="audio/*,video/*,.m4a" style="display:none">
        </div>
    </div>

    <script>
        ${transformersCode}
    <\/script>

    <script>
        const { pipeline, env } = window.Transformers;
        env.allowLocalModels = false;
        env.useBrowserCache = true; // Force le stockage dans IndexedDB

        let p, rec, iv, chunks = [];
        let isBusy = false;
        let globalAudioCtx = null;

        function getCtx() {
            if (!globalAudioCtx) globalAudioCtx = new (window.AudioContext || window.webkitAudioContext)({ sampleRate: 16000 });
            if (globalAudioCtx.state === 'suspended') globalAudioCtx.resume();
            return globalAudioCtx;
        }

        document.getElementById('btn-init').onclick = async () => {
            const b = document.getElementById('btn-init');
            b.innerText = "⏳ Chargement (IndexedDB)...";
            b.disabled = true;
            try {
                p = await pipeline('automatic-speech-recognition', document.getElementById('model-select').value);
                document.getElementById('setup').style.display = 'none';
                document.getElementById('app').style.display = 'block';
                document.getElementById('stat').innerText = "✅ IA CHARGÉE ET OFFLINE";
            } catch(e) { alert("Erreur: " + e.message); b.disabled = false; }
        };

        // DICTÉE
        document.getElementById('btn-rec').onclick = async function() {
            if (!rec || rec.state === 'inactive') {
                const s = await navigator.mediaDevices.getUserMedia({ audio: true });
                rec = new MediaRecorder(s); chunks = [];
                rec.ondataavailable = e => { if(e.data.size > 0) chunks.push(e.data); };
                rec.start(500);
                this.innerText = "⏹ STOP"; this.classList.add('recording');
                
                iv = setInterval(async () => {
                    if (!isBusy && chunks.length > 4) {
                        isBusy = true;
                        try {
                            const b = new Blob(chunks, { type: rec.mimeType });
                            const buf = await b.arrayBuffer();
                            const dec = await getCtx().decodeAudioData(buf);
                            const res = await p(dec.getChannelData(0).slice(-480000), { language: 'french' });
                            document.getElementById('out').value += " " + res.text;
                        } catch(e) {}
                        isBusy = false;
                    }
                }, 3000);
            } else {
                rec.stop(); clearInterval(iv);
                this.innerText = "🎤 MICRO (DICTÉE)"; this.classList.remove('recording');
            }
        };

        // IMPORT (FIX M4A)
        document.getElementById('btn-file').onclick = () => document.getElementById('f-in').click();
        document.getElementById('f-in').onchange = async (e) => {
            const f = e.target.files[0]; if(!f) return;
            document.getElementById('prog').style.display = "block";
            try {
                const dec = await getCtx().decodeAudioData(await f.arrayBuffer());
                const data = dec.getChannelData(0);
                let pos = 0; const step = 16000 * 30;
                while(pos < data.length) {
                    const res = await p(data.slice(pos, pos + step), { language: 'french' });
                    document.getElementById('out').value += res.text + " ";
                    pos += step;
                    const per = Math.min(100, Math.round(pos/data.length*100));
                    document.getElementById('prog-b').style.width = per + "%";
                    document.getElementById('prog-t').innerText = per + "%";
                }
            } catch(err) { alert("Format non supporté ou erreur: " + err.message); }
            document.getElementById('prog').style.display = "none";
        };

        document.getElementById('btn-copy').onclick = () => {
            navigator.clipboard.writeText(document.getElementById('out').value);
            alert("Copié !");
        };
    <\/script>
</body>
</html>`;

                const blob = new Blob([finalHtml], {type: 'text/html'});
                const a = document.createElement('a');
                a.href = URL.createObjectURL(blob);
                a.download = "STT_TOTAL_OFFLINE.html";
                a.click();
                log.innerText = "✅ Terminé ! Fichier téléchargé.";

            } catch (error) {
                log.innerText = "❌ Erreur de récupération du JS : " + error.message;
            }
        };
    </script>
</body>
</html>
