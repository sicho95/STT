<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IA Transcription Flux</title>
    <style>
        :root { --p: #007aff; --d: #ff3b30; --bg: #f2f2f7; }
        * { box-sizing: border-box; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); margin: 0; padding: 10px; display: flex; justify-content: center; }
        .card { background: white; border-radius: 20px; padding: 20px; width: 100%; max-width: 800px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
        .badge { display: block; text-align: center; padding: 8px; border-radius: 10px; font-size: 11px; font-weight: bold; background: #e5e5ea; margin-bottom: 10px; }
        button { width: 100%; border-radius: 12px; border: none; font-size: 16px; margin-top: 10px; padding: 14px; background: var(--p); color: white; font-weight: bold; cursor: pointer; }
        textarea { width: 100%; height: 400px; border-radius: 12px; border: 1px solid #d1d1d6; padding: 15px; margin-top: 15px; font-size: 16px; line-height: 1.5; background: #fff; resize: none; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(120px, 1fr)); gap: 8px; margin-top: 10px; }
        .btn-file { background: #5856d6; }
        .recording { background: var(--d) !important; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.7; } 100% { opacity: 1; } }
        #progress-container { display:none; margin-top:10px; background:#eee; height:6px; border-radius:3px; overflow:hidden; }
        #progress-bar { width:0%; height:100%; background:var(--p); transition: width 0.3s; }
    </style>
</head>
<body>
    <div class="card">
        <div id="lib-stat" class="badge">Chargement...</div>
        
        <div id="setup">
            <select id="model-select">
                <option value="Xenova/whisper-tiny">Whisper Tiny (Recommandé pour la fluidité)</option>
                <option value="Xenova/whisper-base">Whisper Base (Plus lent mais très précis)</option>
            </select>
            <button id="btn-init">DÉMARRER L'IA</button>
        </div>

        <div id="app" style="display:none">
            <button id="btn-rec">🎤 Dictée (Temps réel)</button>
            <div id="progress-container"><div id="progress-bar"></div></div>
            <textarea id="output" placeholder="Parlez ou importez un fichier..."></textarea>
            
            <div class="grid">
                <button id="btn-file-trigger" class="btn-file">📁 Import</button>
                <button id="btn-copy" style="background:#8e8e93">📋 Copier</button>
                <button id="btn-md" style="background:#444">💾 .MD</button>
                <button id="btn-clear" style="background:#ff9500">🗑️ Effacer</button>
            </div>
            <input type="file" id="audio-file" accept="audio/*" style="display:none">
        </div>
    </div>

    <script type="module">
        import { pipeline, env } from 'https://cdn.jsdelivr.net/npm/@xenova/transformers@2.17.2';
        env.allowLocalModels = false;
        window.ai_pipeline_func = pipeline;
        document.getElementById('lib-stat').innerText = "✅ IA PRÊTE (Français)";
        document.getElementById('lib-stat').style.background = "#34c759";
        document.getElementById('lib-stat').style.color = "white";
    </script>

    <script>
    (function() {
        let pipe;
        let rec;
        let chunks = [];
        let interval;
        let validatedText = "";
        let isProcessing = false;

        document.getElementById('btn-init').onclick = async () => {
            const btn = document.getElementById('btn-init');
            btn.innerText = "⏳ Chargement du modèle...";
            try {
                pipe = await window.ai_pipeline_func('automatic-speech-recognition', document.getElementById('model-select').value);
                document.getElementById('setup').style.display = 'none';
                document.getElementById('app').style.display = 'block';
            } catch(e) { alert(e.message); }
        };

        // Fonction IA commune
        async function runAI(audio) {
            return await pipe(audio, { 
                language: 'french', 
                task: 'transcribe',
                repetition_penalty: 1.2
            });
        }

        // --- DICTÉE (CYCLE DE 3 SECONDES) ---
        document.getElementById('btn-rec').onclick = async function() {
            if (!rec || rec.state === 'inactive') {
                const s = await navigator.mediaDevices.getUserMedia({ audio: true });
                rec = new MediaRecorder(s);
                chunks = [];
                validatedText = document.getElementById('output').value;
                rec.ondataavailable = e => { if(e.data.size > 0) chunks.push(e.data); };
                rec.start(500);
                this.innerText = "⏹ Arrêter";
                this.classList.add('recording');

                interval = setInterval(async () => {
                    if (rec.state === 'recording' && chunks.length > 4 && !isProcessing) {
                        isProcessing = true;
                        const blob = new Blob(chunks, { type: rec.mimeType });
                        const buf = await blob.arrayBuffer();
                        const ctx = new AudioContext({ sampleRate: 16000 });
                        const decoded = await ctx.decodeAudioData(buf);
                        // Analyse courte (5s) pour la rapidité
                        const slice = decoded.getChannelData(0).slice(-80000); 
                        const res = await runAI(slice);
                        
                        if (res.text.trim().length > 1) {
                            document.getElementById('output').value = validatedText + " " + res.text.trim();
                            document.getElementById('output').scrollTop = 99999;
                        }
                        // On valide définitivement le texte toutes les 8s
                        if (decoded.length % 128000 < 8000) validatedText = document.getElementById('output').value;
                        isProcessing = false;
                    }
                }, 3000); 
            } else {
                rec.stop();
                clearInterval(interval);
                this.innerText = "🎤 Dictée (Temps réel)";
                this.classList.remove('recording');
            }
        };

        // --- IMPORT (TRANCHES DE 10 SECONDES) ---
        document.getElementById('btn-file-trigger').onclick = () => document.getElementById('audio-file').click();
        document.getElementById('audio-file').onchange = async (e) => {
            const f = e.target.files[0];
            if(!f) return;
            const out = document.getElementById('output');
            const pBox = document.getElementById('progress-container');
            const pBar = document.getElementById('progress-bar');
            
            out.value = "Analyse progressive du fichier...\n";
            pBox.style.display = "block";
            
            const buf = await f.arrayBuffer();
            const ctx = new AudioContext({ sampleRate: 16000 });
            const decoded = await ctx.decodeAudioData(buf);
            const data = decoded.getChannelData(0);
            
            let pos = 0;
            let fullResult = "";
            const step = 16000 * 10; // 10 secondes par tranche
            
            while(pos < data.length) {
                const chunk = data.slice(pos, pos + step);
                const res = await runAI(chunk);
                fullResult += res.text + " ";
                out.value = fullResult;
                out.scrollTop = 99999;
                
                pos += step;
                pBar.style.width = Math.round((pos/data.length)*100) + "%";
            }
            pBox.style.display = "none";
            e.target.value = "";
        };

        document.getElementById('btn-copy').onclick = () => { document.getElementById('output').select(); document.execCommand('copy'); };
        document.getElementById('btn-md').onclick = () => {
            const b = new Blob(["# Transcription\n\n" + document.getElementById('output').value], {type:'text/markdown'});
            const a = document.createElement('a'); a.href = URL.createObjectURL(b); a.download = "transcription.md"; a.click();
        };
        document.getElementById('btn-clear').onclick = () => { document.getElementById('output').value = ""; validatedText = ""; };
    })();
    </script>
</body>
</html>
